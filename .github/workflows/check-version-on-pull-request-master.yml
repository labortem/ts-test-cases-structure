name: Check version on pull request to master

on:
    pull_request:
        branches:
            - master

permissions:
    contents: read

jobs:
    check-version:
        name: Check version availability
        runs-on: ubuntu-latest

        strategy:
            fail-fast: false
            matrix:
                include: ${{ fromJSON(vars.DEPLOYMENT_REGISTRIES) }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4.1.6

            - name: Setup Node.js for ${{ matrix.registry }}
              uses: actions/setup-node@v4.0.2
              with:
                  node-version: "24"
                  registry-url: ${{ matrix.registry }}
                  scope: "@labortem"

            - name: Check the package version is not already published
              env:
                  NODE_AUTH_TOKEN: ${{ secrets[matrix.token_secret] }}
              run: |
                  name=$(npm pkg get name | xargs)
                  version=$(npm pkg get version | xargs)
                  package="${name}@${version}"
                  registry="${{ matrix.registry }}"

                  if npm view "$package" version --registry "$registry" > /dev/null 2>&1; then
                    echo "::error title=Version already published::$package already exists on '$registry'. Bump the version before merging to master."
                    exit 1
                  fi

                  echo "$package is available on '$registry'."

    gate:
        name: Version gate
        runs-on: ubuntu-latest

        needs: check-version
        if: always()

        steps:
            - name: Checkout code
              uses: actions/checkout@v4.1.6

            - name: Validate version naming and availability
              env:
                  PR_TITLE: ${{ github.event.pull_request.title }}
              run: |
                  status=0
                  version=$(npm pkg get version | xargs)

                  if ! printf '%s' "$version" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
                    echo "::error title=Invalid version::package.json version '$version' is not in a.b.c format."
                    status=1
                  fi
                  if [ "$PR_TITLE" != "$version" ]; then
                    echo "::error title=Invalid PR title::The pull request title '$PR_TITLE' must equal the package version '$version' (a.b.c)."
                    status=1
                  fi
                  if [ "${{ needs.check-version.result }}" != "success" ]; then
                    echo "::error title=Version availability::One or more registry availability checks did not pass."
                    status=1
                  fi

                  exit $status
