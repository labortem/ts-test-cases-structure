name: Publish on release

on:
    release:
        types: published

permissions:
    contents: write
    issues: write

jobs:
    validate:
        name: Validate release
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4.1.6

            - name: Validate the tag and name match the package version
              run: |
                  version=$(npm pkg get version | xargs)
                  tag="${{ github.event.release.tag_name }}"
                  name="${{ github.event.release.name }}"

                  status=0
                  if [ "$tag" != "$version" ]; then
                    echo "::error title=Tag mismatch::Release tag '$tag' does not match the package version '$version'."
                    status=1
                  fi
                  if [ "$name" != "$version" ]; then
                    echo "::error title=Name mismatch::Release name '$name' does not match the package version '$version'."
                    status=1
                  fi

                  exit $status

    publish:
        name: Publish
        runs-on: ubuntu-latest

        needs: validate
        if: success()

        strategy:
            fail-fast: false
            matrix:
                include: ${{ fromJSON(vars.REGISTRIES) }}

        steps:
            - name: Checkout code
              uses: actions/checkout@v4.1.6

            - name: Download the release asset
              uses: robinraju/release-downloader@v1.10
              with:
                  tag: ${{ github.event.release.tag_name }}
                  fileName: "*.tgz"
                  out-file-path: release
                  token: ${{ secrets.GITHUB_TOKEN }}

            - name: Setup Node.js for ${{ matrix.registry }}
              uses: actions/setup-node@v4.0.2
              with:
                  node-version: "24"
                  registry-url: ${{ matrix.registry }}
                  scope: "@labortem"

            - name: Check the package version is not already published
              run: |
                  package="$(npm pkg get name | xargs)@$(npm pkg get version | xargs)"

                  if npm view "$package" version --registry "${{ matrix.registry }}" > /dev/null 2>&1; then
                    echo "::error title=Version already published::$package already exists on '${{ matrix.registry }}'."
                    exit 1
                  fi

            - name: Publish to ${{ matrix.registry }}
              run: npm publish ./release/*.tgz --access public
              env:
                  NODE_AUTH_TOKEN: ${{ secrets[matrix.token_secret] }}

    revert:
        name: Revert release commit
        runs-on: ubuntu-latest

        needs: validate
        if: failure()

        steps:
            - name: Checkout master
              uses: actions/checkout@v4.1.6
              with:
                  ref: master
                  fetch-depth: 0
                  token: ${{ secrets.LABORTEM_BOT_PAT }}

            - name: Configure the bot SSH signing key
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.LABORTEM_BOT_SIGNING_PRIVATE_KEY }}" > ~/.ssh/bot_signing_key
                  chmod 600 ~/.ssh/bot_signing_key
                  ssh-keygen -y -f ~/.ssh/bot_signing_key > ~/.ssh/bot_signing_key.pub

                  git config gpg.format ssh
                  git config user.signingkey ~/.ssh/bot_signing_key.pub
                  git config commit.gpgsign true

            - name: Revert the release commit
              id: revert
              run: |
                  git config user.name ${{ vars.LABORTEM_BOT_USERNAME }}
                  git config user.email ${{ vars.LABORTEM_BOT_EMAIL }}

                  git revert --no-edit ${{ github.sha }}
                  git push origin master

                  echo "revert-sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

            - name: Open hotfix issue
              uses: GuillaumeFalourd/open-issue-action@v1
              with:
                  access-token: ${{ secrets.LABORTEM_BOT_PAT }}
                  repo-owner: ${{ github.repository_owner }}
                  repo-name: ${{ github.event.repository.name }}
                  issue-title: "[ACTIONS] Release reverted due to a failed validation"
                  issue-body: |
                      :x: This issue was automatically created by @${{ vars.LABORTEM_BOT_USERNAME }} (run [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})).

                      The release '${{ github.event.release.tag_name }}' failed validation: its tag and name must match the package version.
                      The release commit (${{ github.sha }}) has been reverted as ${{ steps.revert.outputs.revert-sha }}.

                      Please fix the version / tag / name and open a new pull request to the master branch.
                  issue-labels: Hotfix,Actions
                  issue-assignees: ${{ github.actor }}
